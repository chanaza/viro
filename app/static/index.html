<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viro</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234f46e5'/><circle cx='16' cy='16' r='9' stroke='white' stroke-width='2' fill='none'/><circle cx='16' cy='16' r='3' fill='white'/><line x1='16' y1='7' x2='16' y2='11' stroke='white' stroke-width='2'/><line x1='16' y1='21' x2='16' y2='25' stroke='white' stroke-width='2'/><line x1='7' y1='16' x2='11' y2='16' stroke='white' stroke-width='2'/><line x1='21' y1='16' x2='25' y2='16' stroke='white' stroke-width='2'/></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f9fafb;
    --surface:   #ffffff;
    --border:    #e2e8f0;
    --text:      #1e293b;
    --muted:     #64748b;
    --accent:    #4f46e5;
    --accent-lt: #eef2ff;
    --green:     #16a34a;
    --green-lt:  #dcfce7;
    --red:       #dc2626;
    --red-lt:    #fee2e2;
    --amber:     #d97706;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    color: var(--text);
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 18px; height: 18px; }
  .header-title { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  header h1 { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; line-height: 1; }
  .tagline { font-size: 0.72rem; color: #94a3b8; letter-spacing: 0.03em; line-height: 1; }
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.72rem;
    color: var(--muted);
  }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #94a3b8;
    transition: background 0.3s;
  }
  #status-dot.idle    { background: #94a3b8; }
  #status-dot.running { background: #22c55e; animation: pulse 1.2s infinite; }
  #status-dot.paused  { background: var(--amber); }
  #status-dot.done    { background: var(--accent); }
  #status-dot.error   { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.35; } }

  /* ── Chat ── */
  #chat {
    flex: 1; overflow-y: auto;
    padding: 16px 14px;
    display: flex; flex-direction: column; gap: 8px;
    scroll-behavior: smooth;
  }

  /* ── User bubble ── */
  .msg-user {
    align-self: flex-start;
    background: var(--accent-lt);
    color: #312e81;
    border: 1px solid #c7d2fe;
    padding: 10px 14px;
    border-radius: 16px 16px 16px 4px;
    font-size: 0.88rem;
    line-height: 1.55;
    max-width: 88%;
    word-break: break-word;
  }

  /* ── Answer bubble ── */
  .msg-answer {
    align-self: flex-end;
    background: #f0fdf4;
    color: #166534;
    border: 1px solid #d1fae5;
    padding: 12px 14px;
    border-radius: 16px 16px 4px 16px;
    font-size: 0.88rem;
    line-height: 1.6;
    max-width: 88%;
    word-break: break-word;
  }
  .msg-answer .answer-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #16a34a;
    margin-bottom: 5px;
  }
  .msg-answer .md h1,.msg-answer .md h2,.msg-answer .md h3 {
    font-weight: 700; margin: 10px 0 4px; color: #14532d;
  }
  .msg-answer .md h1 { font-size: 1rem; }
  .msg-answer .md h2 { font-size: 0.93rem; }
  .msg-answer .md h3 { font-size: 0.88rem; }
  .msg-answer .md p  { margin: 0 0 6px; }
  .msg-answer .md p:last-child { margin-bottom: 0; }
  .msg-answer .md ul,.msg-answer .md ol { padding-right: 18px; margin: 4px 0 6px; }
  .msg-answer .md li { margin-bottom: 3px; }
  .msg-answer .md code {
    background: #dcfce7; border-radius: 4px;
    padding: 1px 5px; font-size: 0.82rem; font-family: monospace;
  }
  .msg-answer .md pre {
    background: #dcfce7; border-radius: 8px;
    padding: 10px 12px; overflow-x: auto; margin: 6px 0;
  }
  .msg-answer .md pre code { background: none; padding: 0; }
  .msg-answer .md blockquote {
    border-right: 3px solid #86efac; margin: 6px 0;
    padding: 4px 10px; color: #166534; opacity: 0.85;
  }
  .msg-answer .md strong { font-weight: 700; }
  .msg-answer .md hr { border: none; border-top: 1px solid #d1fae5; margin: 8px 0; }
  .msg-answer .md a { color: #15803d; text-decoration: underline; }
  .msg-answer .md table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 0.83rem; }
  .msg-answer .md th,.msg-answer .md td { border: 1px solid #d1fae5; padding: 4px 8px; white-space: nowrap; }
  .msg-answer .md th { background: #dcfce7; font-weight: 600; }
  .msg-answer .md table { display: block; overflow-x: auto; }
  .answer-files {
    display: flex; gap: 8px; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid #d1fae5;
  }
  .answer-files button {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    background: #f0fdf4; color: #166534;
    border: 1px solid #d1fae5; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600; cursor: pointer;
    transition: background 0.15s;
  }
  .answer-files button:hover { background: #dcfce7; }

  /* ── Error bubble ── */
  .msg-error {
    align-self: flex-end;
    background: var(--red-lt);
    color: #7f1d1d;
    border: 1px solid #fecaca;
    padding: 10px 14px;
    border-radius: 16px 16px 4px 16px;
    font-size: 0.85rem;
    max-width: 88%;
  }

  /* ── Steps group ── */
  .steps-group { align-self: flex-end; width: 100%; max-width: 88%; }
  .steps-toggle {
    display: flex; align-items: center; gap: 7px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 0.75rem;
    padding: 3px 0; width: 100%; text-align: right;
  }
  .steps-toggle .chevron { display: inline-block; transition: transform 0.2s; font-style: normal; }
  .steps-toggle.open .chevron { transform: rotate(90deg); }
  .steps-toggle .pill {
    background: var(--border); border-radius: 10px;
    padding: 1px 8px; font-weight: 600; color: var(--muted); font-size: 0.7rem;
  }
  .steps-body { display: none; flex-direction: column; gap: 4px; margin-top: 6px; }
  .steps-body.open { display: flex; }
  .step-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 12px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .step-num-badge {
    background: var(--accent-lt); color: var(--accent);
    font-size: 0.65rem; font-weight: 700; border-radius: 6px;
    padding: 2px 6px; flex-shrink: 0; margin-top: 1px;
  }
  .step-content { flex: 1; min-width: 0; }
  .step-goal { font-size: 0.82rem; color: var(--text); line-height: 1.4; }
  .step-action {
    display: inline-block; margin-top: 4px; font-size: 0.68rem;
    background: var(--bg); color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px; padding: 1px 7px;
  }

  /* ── Footer ── */
  footer {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  }
  #controls { display: flex; gap: 6px; }
  #controls button {
    padding: 5px 13px; border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; font-size: 0.78rem; font-weight: 600;
    background: var(--surface); color: var(--text);
    transition: background 0.15s, opacity 0.15s;
  }
  #btn-pause:not(:disabled):hover  { background: var(--bg); }
  #btn-resume:not(:disabled):hover { background: var(--accent-lt); border-color: #c7d2fe; color: var(--accent); }
  #btn-stop:not(:disabled):hover   { background: #fff1f2; border-color: #fecdd3; color: #be123c; }
  #controls button:disabled { opacity: 0.35; cursor: not-allowed; }

  #input-row { display: flex; gap: 8px; align-items: flex-end; }
  #task-input {
    flex: 1; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 0.88rem; font-family: inherit; resize: none; outline: none;
    line-height: 1.5; background: var(--bg); color: var(--text);
    transition: border-color 0.15s;
  }
  #task-input:focus { border-color: var(--accent); background: var(--surface); }
  #task-input::placeholder { font-family: inherit; color: #94a3b8; }
  #btn-send {
    padding: 9px 16px; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; cursor: pointer;
    font-size: 0.88rem; font-weight: 700; white-space: nowrap;
    transition: background 0.15s;
  }
  #btn-send:hover { background: #4338ca; }
  #btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Settings button ── */
  #btn-settings {
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 4px; border-radius: 6px;
    display: flex; align-items: center;
    transition: color 0.15s, background 0.15s;
  }
  #btn-settings:hover { color: var(--text); background: var(--bg); }

  /* ── Settings modal ── */
  #settings-modal {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(15, 23, 42, 0.5);
    align-items: center; justify-content: center;
  }
  #settings-modal.open { display: flex; }
  .settings-dialog {
    background: var(--surface); border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    width: 480px; max-width: calc(100vw - 32px);
    max-height: calc(100vh - 48px);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .settings-dialog-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 14px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .settings-dialog-header h2 { font-size: 0.95rem; font-weight: 700; }
  #btn-close-settings {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.1rem; line-height: 1;
    padding: 2px 6px; border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  #btn-close-settings:hover { color: var(--text); background: var(--bg); }

  .settings-dialog-body {
    padding: 16px 20px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 16px;
    font-size: 0.82rem;
  }

  /* Section title */
  .s-section-title {
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted);
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }

  .settings-field { display: flex; flex-direction: column; gap: 4px; }
  .settings-field label { font-size: 0.75rem; font-weight: 600; color: var(--muted); }
  .settings-field input, .settings-field select {
    padding: 6px 9px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.82rem; font-family: inherit;
    background: var(--bg); color: var(--text); outline: none;
  }
  .settings-field input:focus, .settings-field select:focus { border-color: var(--accent); background: var(--surface); }
  .settings-field input[type="password"] { letter-spacing: 0.1em; }

  .model-note {
    font-size: 0.72rem; color: var(--muted);
    margin-top: 3px; line-height: 1.4;
  }

  .s-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }

  .google-auth-toggle {
    display: flex; gap: 0; border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .google-auth-toggle button {
    flex: 1; padding: 6px; border: none; background: var(--bg);
    font-size: 0.78rem; font-weight: 600; color: var(--muted); cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .google-auth-toggle button.active { background: var(--accent); color: #fff; }

  .settings-dialog-footer {
    display: flex; gap: 8px; align-items: center; justify-content: flex-end;
    padding: 12px 20px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  #btn-auth {
    margin-right: auto; padding: 6px 14px;
    background: #1a73e8; color: #fff;
    border: none; border-radius: 8px;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    transition: background 0.15s;
  }
  #btn-auth:hover { background: #1557b0; }
  #btn-cancel-settings {
    padding: 6px 16px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    transition: background 0.15s;
  }
  #btn-cancel-settings:hover { background: #f1f5f9; }
  #btn-save-settings {
    padding: 6px 18px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    transition: background 0.15s;
  }
  #btn-save-settings:hover { background: #4338ca; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="9" cy="9" r="5.5" stroke="white" stroke-width="1.5"/>
      <circle cx="9" cy="9" r="1.8" fill="white"/>
      <line x1="9" y1="1" x2="9" y2="4.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="13.5" x2="9" y2="17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="1" y1="9" x2="4.5" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="13.5" y1="9" x2="17" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M15 13l1.5 1.5-.6.25.25 1.25-1.1-.9-.5.9-.2-1.35-.75-.2 1.35-1.2z" fill="white"/>
    </svg>
  </div>
  <div class="header-title">
    <h1>Viro</h1>
    <span class="tagline">Your powerful web action agent</span>
  </div>
  <div class="status-badge">
    <div id="status-dot" class="idle"></div>
    <span id="status-label">Ready</span>
  </div>
  <button id="btn-settings" title="Settings" onclick="toggleSettings()">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
    </svg>
  </button>
</header>

<!-- ── Settings modal ── -->
<div id="settings-modal" onclick="onModalBackdropClick(event)">
  <div class="settings-dialog">
    <div class="settings-dialog-header">
      <h2>Settings</h2>
      <button id="btn-close-settings" onclick="closeSettings()" title="Close">✕</button>
    </div>
    <div class="settings-dialog-body">

      <!-- Model -->
      <div>
        <div class="s-section-title">Model</div>
        <div class="settings-field" style="margin-top:8px">
          <label>Active model</label>
          <select id="s-model" onchange="onModelChange()"></select>
          <div id="model-note" class="model-note"></div>
        </div>
      </div>

      <!-- Google credentials -->
      <div>
        <div class="s-section-title">Google credentials</div>
        <div style="margin-top:8px; display:flex; flex-direction:column; gap:10px">
          <div class="settings-field">
            <label>Auth method</label>
            <div class="google-auth-toggle">
              <button id="auth-btn-apikey" onclick="setGoogleAuth('apikey')">API Key</button>
              <button id="auth-btn-vertex" onclick="setGoogleAuth('vertex')">Vertex AI</button>
            </div>
          </div>
          <div id="field-apikey" class="settings-field">
            <label>API Key</label>
            <input id="s-apikey" type="password" placeholder="AIza...">
          </div>
          <div id="field-vertex" class="s-2col" style="display:none">
            <div class="settings-field">
              <label>Project ID</label>
              <input id="s-project" type="text" placeholder="my-project">
            </div>
            <div class="settings-field">
              <label>Region</label>
              <input id="s-region" type="text" placeholder="europe-west3">
            </div>
          </div>
        </div>
      </div>

      <!-- Other providers -->
      <div>
        <div class="s-section-title">Other provider API keys</div>
        <div class="s-2col" style="margin-top:8px">
          <div class="settings-field">
            <label>Groq</label>
            <input id="s-groq" type="password" placeholder="gsk_...">
          </div>
          <div class="settings-field">
            <label>OpenAI</label>
            <input id="s-openai" type="password" placeholder="sk-...">
          </div>
          <div class="settings-field" style="grid-column:1/-1">
            <label>Anthropic</label>
            <input id="s-anthropic" type="password" placeholder="sk-ant-...">
          </div>
        </div>
      </div>

      <!-- General -->
      <div>
        <div class="s-section-title">General</div>
        <div class="s-2col" style="margin-top:8px">
          <div class="settings-field">
            <label>Max steps</label>
            <input id="s-maxsteps" type="number" min="10" max="500" placeholder="100">
          </div>
          <div class="settings-field">
            <label>Browser profile</label>
            <select id="profile-select"></select>
          </div>
        </div>
      </div>

    </div>
    <div class="settings-dialog-footer">
      <button id="btn-auth" onclick="doAuthGoogle()">🔑 Google Auth</button>
      <button id="btn-cancel-settings" onclick="closeSettings()">Cancel</button>
      <button id="btn-save-settings" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div id="chat"></div>

<footer>
  <div id="controls">
    <button id="btn-pause"  onclick="doPause()"  disabled>⏸ Pause</button>
    <button id="btn-resume" onclick="doResume()" disabled>▶ Resume</button>
    <button id="btn-stop"   onclick="doStop()"   disabled>⏹ Stop</button>
  </div>
  <div id="input-row">
    <textarea id="task-input" rows="2" placeholder="Describe a task... (Enter to send)"></textarea>
    <button id="btn-send" onclick="doSend()">Send</button>
  </div>
</footer>

<script>
  let state = 'idle';
  let es = null;
  let stepsGroup = null;

  const chat      = document.getElementById('chat');
  const input     = document.getElementById('task-input');
  const btnSend   = document.getElementById('btn-send');
  const btnPause  = document.getElementById('btn-pause');
  const btnResume = document.getElementById('btn-resume');
  const btnStop   = document.getElementById('btn-stop');
  const dot       = document.getElementById('status-dot');
  const label     = document.getElementById('status-label');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
  });

  function setState(s) {
    state = s;
    dot.className = s;
    const labels = { idle: 'Ready', running: 'Running', paused: 'Paused', done: 'Done', error: 'Error' };
    label.textContent = labels[s] || s;
    btnPause.disabled  = s !== 'running';
    btnResume.disabled = s !== 'paused';
    btnStop.disabled   = s === 'idle' || s === 'done';
    btnSend.textContent = s === 'idle' || s === 'done' ? 'Send' : 'Add instruction';
  }

  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'msg-user';
    d.textContent = text;
    chat.appendChild(d);
    scrollChat();
  }

  function addAnswerMsg(text, answerPath, logPath) {
    const d = document.createElement('div');
    d.className = 'msg-answer';
    const body = text
      ? `<div class="md">${marked.parse(text)}</div>`
      : '<div>(no result)</div>';
    let files = '';
    if (answerPath || logPath) {
      files = '<div class="answer-files">';
      if (answerPath) files += `<button onclick="openFile(${JSON.stringify(answerPath)})">&#128196; Answer file</button>`;
      if (logPath)    files += `<button onclick="openFile(${JSON.stringify(logPath)})">&#128196; Log file</button>`;
      files += '</div>';
    }
    d.innerHTML = `<div class="answer-label">Answer</div>${body}${files}`;
    chat.appendChild(d);
    scrollChat();
  }

  async function openFile(path) {
    try { await post('/open-file', { path }); } catch(e) { addErrorMsg(e.message); }
  }

  function addErrorMsg(text) {
    const d = document.createElement('div');
    d.className = 'msg-error';
    d.textContent = text;
    chat.appendChild(d);
    scrollChat();
  }

  function ensureStepsGroup() {
    if (stepsGroup) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'steps-group';
    const toggle = document.createElement('button');
    toggle.className = 'steps-toggle';
    toggle.innerHTML = `<i class="chevron">›</i><span class="pill">0</span><span>Steps</span>`;
    const body = document.createElement('div');
    body.className = 'steps-body';
    toggle.onclick = () => { toggle.classList.toggle('open'); body.classList.toggle('open'); };
    wrapper.appendChild(toggle);
    wrapper.appendChild(body);
    chat.appendChild(wrapper);
    stepsGroup = { toggle, body, count: 0 };
    scrollChat();
  }

  function addStep(stepNum, goal, action) {
    ensureStepsGroup();
    stepsGroup.count++;
    stepsGroup.toggle.querySelector('.pill').textContent = stepsGroup.count;
    const item = document.createElement('div');
    item.className = 'step-item';
    item.innerHTML =
      `<span class="step-num-badge">${stepNum}</span>` +
      `<div class="step-content">` +
        `<div class="step-goal">${goal || ''}</div>` +
        (action ? `<span class="step-action">${action}</span>` : '') +
      `</div>`;
    stepsGroup.body.appendChild(item);
    scrollChat();
  }

  function scrollChat() { chat.scrollTop = chat.scrollHeight; }

  async function post(path, body) {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }
    return r.json();
  }

  function startSSE() {
    if (es) es.close();
    stepsGroup = null;
    es = new EventSource('/stream');
    es.onmessage = e => {
      const ev = JSON.parse(e.data);
      if (ev.type === 'ping') return;
      if (ev.type === 'step') {
        addStep(ev.step, ev.goal, ev.action);
      } else if (ev.type === 'paused') {
        setState('paused');
      } else if (ev.type === 'resumed') {
        setState('running');
      } else if (ev.type === 'done') {
        addAnswerMsg(ev.result, ev.answer_path, ev.log_path);
        setState('done');
        es.close();
      } else if (ev.type === 'stopped') {
        addErrorMsg('Agent stopped.');
        setState('idle');
        es.close();
      } else if (ev.type === 'error') {
        addErrorMsg(ev.message);
        setState('error');
        es.close();
      }
    };
    es.onerror = () => {
      if (state === 'running' || state === 'paused') setTimeout(startSSE, 2000);
    };
  }

  async function doSend() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addUserMsg(text);
    try {
      if (state === 'idle' || state === 'done' || state === 'error') {
        await post('/start', { task: text });
        setState('running');
        startSSE();
      } else {
        await post('/send', { message: text });
      }
    } catch (e) { addErrorMsg(e.message); }
  }

  async function doPause() {
    try { await post('/pause'); setState('paused'); } catch(e) { addErrorMsg(e.message); }
  }
  async function doResume() {
    const text = input.value.trim();
    if (text) { doSend(); }
    else { try { await post('/resume'); setState('running'); } catch(e) { addErrorMsg(e.message); } }
  }
  async function doStop() {
    btnStop.disabled = true;
    try { await post('/stop'); } catch(e) { addErrorMsg(e.message); btnStop.disabled = false; }
  }

  marked.use({
    gfm: true, breaks: true,
    renderer: (() => {
      const r = new marked.Renderer();
      r.link = ({ href, title, text }) =>
        `<a href="${href}" target="_blank" rel="noopener"${title ? ` title="${title}"` : ''}>${text}</a>`;
      return r;
    })(),
  });

  // ── Settings ──────────────────────────────────────────────────────────────
  const settingsModal = document.getElementById('settings-modal');
  const profileSelect = document.getElementById('profile-select');
  let _googleAuth = 'vertex';
  let _allModels  = [];

  function setGoogleAuth(type) {
    _googleAuth = type;
    document.getElementById('auth-btn-apikey').classList.toggle('active', type === 'apikey');
    document.getElementById('auth-btn-vertex').classList.toggle('active', type === 'vertex');
    document.getElementById('field-apikey').style.display = type === 'apikey' ? '' : 'none';
    document.getElementById('field-vertex').style.display = type === 'vertex' ? '' : 'none';
  }

  function onModelChange() {
    const val  = document.getElementById('s-model').value;
    const meta = _allModels.find(m => m.value === val);
    document.getElementById('model-note').textContent = meta?.note || '';
  }

  function closeSettings() { settingsModal.classList.remove('open'); }
  function onModalBackdropClick(e) { if (e.target === settingsModal) closeSettings(); }

  async function toggleSettings() {
    try {
      const [cfg, modelsData, profileData] = await Promise.all([
        fetch('/settings').then(r => r.json()),
        fetch('/models').then(r => r.json()),
        fetch('/profiles').then(r => r.json()),
      ]);

      // Model dropdown
      _allModels = modelsData.models || [];
      const modelSel = document.getElementById('s-model');
      modelSel.innerHTML = '';
      const knownValues = _allModels.map(m => m.value);
      // Legacy model not in list
      if (cfg.model && !knownValues.includes(cfg.model)) {
        const o = document.createElement('option');
        o.value = cfg.model; o.textContent = `${cfg.model} (legacy)`; o.selected = true;
        modelSel.appendChild(o);
      }
      for (const m of _allModels) {
        const o = document.createElement('option');
        o.value = m.value;
        o.textContent = m.label;
        if (m.value === cfg.model) o.selected = true;
        modelSel.appendChild(o);
      }
      onModelChange();

      // Google credentials
      document.getElementById('s-apikey').value  = cfg.gemini_api_key       || '';
      document.getElementById('s-project').value = cfg.google_cloud_project  || '';
      document.getElementById('s-region').value  = cfg.llm_location          || '';
      setGoogleAuth(cfg.google_auth_type || 'vertex');

      // Other providers
      document.getElementById('s-groq').value     = cfg.groq_api_key      || '';
      document.getElementById('s-openai').value   = cfg.openai_api_key    || '';
      document.getElementById('s-anthropic').value = cfg.anthropic_api_key || '';

      // General
      document.getElementById('s-maxsteps').value = cfg.max_steps ?? 100;
      profileSelect.innerHTML = '';
      for (const p of profileData.profiles) {
        const opt = document.createElement('option');
        opt.value = p.id; opt.textContent = p.label;
        if (p.id === profileData.active) opt.selected = true;
        profileSelect.appendChild(opt);
      }
    } catch(e) { addErrorMsg(e.message); return; }
    settingsModal.classList.add('open');
  }

  async function saveSettings() {
    try {
      await post('/settings', {
        model:                document.getElementById('s-model').value,
        google_auth_type:     _googleAuth,
        gemini_api_key:       document.getElementById('s-apikey').value.trim(),
        google_cloud_project: document.getElementById('s-project').value.trim(),
        llm_location:         document.getElementById('s-region').value.trim(),
        groq_api_key:         document.getElementById('s-groq').value.trim(),
        openai_api_key:       document.getElementById('s-openai').value.trim(),
        anthropic_api_key:    document.getElementById('s-anthropic').value.trim(),
        max_steps:            parseInt(document.getElementById('s-maxsteps').value) || 100,
        browser_profile:      profileSelect.value,
      });
      closeSettings();
    } catch(e) { addErrorMsg(e.message); }
  }

  async function doAuthGoogle() {
    try {
      await post('/auth-google', {});
      addErrorMsg('A browser window will open for Google sign-in. After completing sign-in, try again.');
    } catch(e) { addErrorMsg(e.message); }
  }

  setState('idle');
</script>
</body>
</html>
